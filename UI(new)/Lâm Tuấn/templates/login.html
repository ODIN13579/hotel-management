<!doctype html>
<html>
  <head>
    <title>Trang chủ</title>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>

  <body>
    <!--https://www.facebook.com/nguyen.minh.hung.483405
     -->

    <div class="container">
      <form method="POST">
        <div class="login-box">
          <a class="logo" href="https://www.facebook.com/huytunn">
            <img
              src="{{ url_for('static', filename='Logo-removebg.png') }}"
              style="width: 100%; height: 100%; object-fit: contain"
            />
          </a>
          <h2>Đăng nhập</h2>

          <div class="input-box">
            <span class="icon"><i class="fa-solid fa-envelope"></i></span>
            <input type="text" class="username" name="username" required />
            <label class="lb">Tên tài khoản</label>
          </div>

          <div class="input-box">
            <span class="icon"><i class="fa-solid fa-lock"></i></span>
            <input type="password" class="pass" name="password" required />
            <label class="lb">Mật khẩu</label>
          </div>
          <div>
            {% if error %}
            <p style="color: red; text-align: center; padding: 10px 10px">
              {{ error }}
            </p>
            {% endif %}
          </div>

          <div class="remember-forgot">
            <a href="#" class="reset">Quên mật khẩu?</a>
          </div>

          <button type="submit">Đăng nhập</button>

          <div class="register-link">
            <p>
              Nếu chưa có tài khoản, hãy
              <a href="{{ url_for('register') }}">Đăng kí</a>
            </p>
          </div>
        </div>
      </form>
    </div>
  </body>
</html>
